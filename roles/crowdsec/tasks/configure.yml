---
- name: Oprire CrowdSec inainte de configurare
  systemd:
    name: crowdsec
    state: stopped

- name: Configurare config.yaml CrowdSec (PostgreSQL backend)
  template:
    src: config.yaml.j2
    dest: /etc/crowdsec/config.yaml
    owner: root
    group: root
    mode: '0640'

- name: Verificare existenta local_api_credentials.yaml
  stat:
    path: /etc/crowdsec/local_api_credentials.yaml
  register: crowdsec_local_api_creds

- name: Configurare local_api_credentials.yaml (doar daca lipseste)
  template:
    src: local_api_credentials.yaml.j2
    dest: /etc/crowdsec/local_api_credentials.yaml
    owner: root
    group: root
    mode: '0600'
  when: not crowdsec_local_api_creds.stat.exists

- name: Validare configuratie CrowdSec
  command: crowdsec -c /etc/crowdsec/config.yaml -t -error
  register: crowdsec_config_test
  changed_when: false

- name: Instalare colectii CrowdSec
  command: "cscli collections install {{ item }}"
  loop: "{{ crowdsec_collections }}"
  ignore_errors: yes

- name: Actualizare hub CrowdSec
  command: cscli hub update
  ignore_errors: yes

- name: Pornire si activare CrowdSec
  systemd:
    name: crowdsec
    state: started
    enabled: yes
  register: crowdsec_start
  failed_when: false

- name: Status systemd CrowdSec (debug la failure)
  command: systemctl status crowdsec --no-pager -l
  register: crowdsec_status
  changed_when: false
  failed_when: false
  when: crowdsec_start is failed

- name: Loguri CrowdSec (debug la failure)
  command: journalctl -u crowdsec -n 120 --no-pager
  register: crowdsec_journal
  changed_when: false
  failed_when: false
  when: crowdsec_start is failed

- name: Fail explicit daca CrowdSec nu a pornit
  fail:
    msg: |
      CrowdSec nu a pornit pe {{ inventory_hostname }}.

      --- systemctl status crowdsec ---
      {{ crowdsec_status.stdout | default('n/a') }}

      --- journalctl -u crowdsec -n 120 ---
      {{ crowdsec_journal.stdout | default('n/a') }}
  when: crowdsec_start is failed

- name: Inregistrare in CrowdSec Console (optional)
  command: "cscli console enroll {{ crowdsec_enroll_key }}"
  when: crowdsec_enroll_key | length > 0
  ignore_errors: yes
