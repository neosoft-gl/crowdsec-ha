---
- name: Instalare dependinte PostgreSQL si Patroni
  apt:
    name:
      - gnupg2
      - curl
      - ca-certificates
      - python3-psycopg2
      - python3-pip
      - python3-venv
      - acl
      - watchdog
    state: present
    update_cache: yes

- name: Creare director keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Descarcare cheie GPG PostgreSQL
  shell: |
    set -euo pipefail
    curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
  args:
    creates: /etc/apt/keyrings/postgresql.gpg
    executable: /bin/bash

- name: Adaugare repository PostgreSQL (signed-by)
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Instalare PostgreSQL {{ postgresql_version }}
  apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - "postgresql-contrib-{{ postgresql_version }}"
    state: present
    update_cache: yes

# Patroni va gestiona ciclul de viata al PostgreSQL - oprire serviciu default
- name: Oprire si dezactivare serviciu postgresql default (Patroni il va gestiona)
  systemd:
    name: postgresql
    state: stopped
    enabled: no
  ignore_errors: yes

- name: Creare virtualenv Patroni
  command: "/usr/bin/python3 -m venv {{ patroni_venv_path }}"
  args:
    creates: "{{ patroni_venv_path }}/bin/python"

- name: Upgrade pip in virtualenv Patroni
  command: "{{ patroni_venv_path }}/bin/pip install --upgrade pip"

- name: Instalare Patroni cu raft in virtualenv
  command: >
    {{ patroni_venv_path }}/bin/pip install
    patroni[raft]
    psycopg2-binary


- name: Creare director configurare Patroni
  file:
    path: /etc/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'

- name: Creare director date Patroni Raft
  file:
    path: /var/lib/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'

- name: Creare director log Patroni
  file:
    path: /var/log/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'
